# The SSSM application services, rendered from the in-repo umbrella Helm chart.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sssm-services
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: sssm
  source:
    repoURL: https://github.com/lvoxx/supar-simple-social-media.git
    targetRevision: main
    path: deploy/helm/sssm-services
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: sssm
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

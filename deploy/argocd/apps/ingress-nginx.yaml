# Upstream ingress-nginx chart (pinned). NLB in front (cheaper than ALB for L4
# pass-through; ARCHITECTURE.md tolerates either). Metrics on for the Phase-1
# Observability slice to scrape next.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-nginx
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: sssm
  source:
    repoURL: https://kubernetes.github.io/ingress-nginx
    chart: ingress-nginx
    targetRevision: 4.15.1 # app v1.15.1 — verified latest stable
    helm:
      valuesObject:
        controller:
          service:
            annotations:
              service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
          ingressClassResource:
            default: true
          metrics:
            enabled: true
  destination:
    server: https://kubernetes.default.svc
    namespace: ingress-nginx
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

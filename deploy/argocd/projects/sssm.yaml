# ArgoCD project scoping every SSSM application to this git repo + the upstream
# chart repos it pulls from.
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: sssm
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: SSSM platform applications
  sourceRepos:
    - https://github.com/lvoxx/supar-simple-social-media.git
    - https://kubernetes.github.io/ingress-nginx
  destinations:
    - namespace: "*"
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"

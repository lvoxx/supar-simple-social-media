apiVersion: v1
kind: Service
metadata:
  name: group-service
  namespace: {{ .Values.global.namespace }}
  labels:
    app: group-service
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
      protocol: TCP
      name: http
  selector:
    app: group-service

image:
  repository: "{{ .Values.global.registry }}/user-service"
  tag: "1.0.0"

replicaCount: 2

service:
  type: ClusterIP
  port: 8081

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 70 }
    - type: Resource
      resource:
        name: memory
        target: { type: Utilization, averageUtilization: 80 }

resources:
  requests:
    cpu:    250m
    memory: 512Mi
  limits:
    cpu:    "1"
    memory: 1Gi

env:
  SPRING_PROFILES_ACTIVE: prod
  SERVER_PORT: "8081"
  TRACING_SAMPLE_RATE: "0.1"

externalSecrets:
  - secretName: user-service-secrets
    remoteRef:  sssm/prod/user-service
    keys:
      - DB_HOST
      - DB_PORT
      - DB_NAME
      - DB_USER
      - DB_PASSWORD
      - REDIS_HOST
      - REDIS_PORT
      - REDIS_PASSWORD
      - KAFKA_BOOTSTRAP_SERVERS
      - KAFKA_SASL_USERNAME
      - KAFKA_SASL_PASSWORD
      - KEYCLOAK_ADMIN_URL
      - KEYCLOAK_ADMIN_CLIENT_SECRET

dbInit:
  enabled: true
  image: flyway/flyway:10
  secretRef: user-service-secrets


livenessProbe:
  httpGet:
    path: /actuator/health/liveness
    port: 8081
  initialDelaySeconds: 60
  periodSeconds: 15

readinessProbe:
  httpGet:
    path: /actuator/health/readiness
    port: 8081
  initialDelaySeconds: 30
  periodSeconds: 10

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          topologyKey: kubernetes.io/hostname
          labelSelector:
            matchLabels:
              app: user-service

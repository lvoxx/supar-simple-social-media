kube-prometheus-stack:
  grafana:
    enabled: true
    adminPassword: "${GRAFANA_ADMIN_PASSWORD}"
    persistence:
      enabled:      true
      size:         10Gi
      storageClass: gp3
    nodeSelector: { role: system }
    sidecar:
      dashboards:
        enabled:              true
        searchNamespace:      ALL
        folderAnnotation:     "grafana_folder"
    additionalDataSources:
      - name:   Loki
        type:   loki
        url:    http://loki:3100
        access: proxy
      - name:   Zipkin
        type:   zipkin
        url:    http://zipkin:9411
        access: proxy

  prometheus:
    prometheusSpec:
      retention:           30d
      retentionSize:       50GB
      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: gp3
            accessModes: [ReadWriteOnce]
            resources:
              requests:
                storage: 100Gi
      nodeSelector: { role: system }
      podMonitorSelectorNilUsesHelmValues: false
      serviceMonitorSelectorNilUsesHelmValues: false

  alertmanager:
    alertmanagerSpec:
      nodeSelector: { role: system }
    config:
      route:
        group_by: [alertname, namespace]
        receiver: slack-notifications
      receivers:
        - name: slack-notifications
          slack_configs:
            - api_url: "${SLACK_WEBHOOK_URL}"
              channel: "#alerts"
              send_resolved: true

loki-stack:
  loki:
    enabled: true
    persistence:
      enabled:          true
      size:             50Gi
      storageClassName: gp3
    nodeSelector: { role: system }
  promtail:
    enabled: true

zipkin:
  enabled: true
  replicaCount: 2
  nodeSelector: { role: system }
  storage:
    type: mem   # switch to elasticsearch for prod persistence
  resources:
    requests: { cpu: 250m, memory: 512Mi }
    limits:   { cpu: 1,    memory: 1Gi   }

apiVersion: v1
kind: ConfigMap
metadata:
  name: post-service-migrations
  namespace: sssm
data:
  V1__init_posts.sql: |
    CREATE TABLE IF NOT EXISTS posts (
        id               UUID        PRIMARY KEY DEFAULT gen_random_uuid(),
        author_id        UUID        NOT NULL,
        group_id         UUID,
        content          TEXT,
        repost_of_id     UUID,
        quoted_post_id   UUID,
        post_type        VARCHAR(20) NOT NULL DEFAULT 'ORIGINAL',
        status           VARCHAR(20) NOT NULL DEFAULT 'PUBLISHED',
        visibility       VARCHAR(20) NOT NULL DEFAULT 'PUBLIC',
        is_edited        BOOLEAN     NOT NULL DEFAULT FALSE,
        edited_at        TIMESTAMPTZ,
        is_pinned        BOOLEAN     NOT NULL DEFAULT FALSE,
        created_at       TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        updated_at       TIMESTAMPTZ,
        created_by       UUID,
        updated_by       UUID,
        is_deleted       BOOLEAN     NOT NULL DEFAULT FALSE,
        deleted_at       TIMESTAMPTZ,
        deleted_by       UUID
    );
    CREATE INDEX IF NOT EXISTS idx_posts_author_id ON posts(author_id) WHERE is_deleted = false;
    CREATE INDEX IF NOT EXISTS idx_posts_group_id  ON posts(group_id)  WHERE is_deleted = false;
    CREATE INDEX IF NOT EXISTS idx_posts_status    ON posts(status)    WHERE is_deleted = false;

    CREATE TABLE IF NOT EXISTS post_media (
        post_id    UUID NOT NULL,
        media_id   UUID NOT NULL,
        position   INT  NOT NULL DEFAULT 0,
        PRIMARY KEY (post_id, media_id)
    );

    CREATE TABLE IF NOT EXISTS post_hashtags (
        post_id  UUID         NOT NULL,
        hashtag  VARCHAR(100) NOT NULL,
        PRIMARY KEY (post_id, hashtag)
    );

    CREATE TABLE IF NOT EXISTS post_mentions (
        post_id           UUID NOT NULL,
        mentioned_user_id UUID NOT NULL,
        PRIMARY KEY (post_id, mentioned_user_id)
    );

    CREATE TABLE IF NOT EXISTS post_edits (
        id               UUID        PRIMARY KEY DEFAULT gen_random_uuid(),
        post_id          UUID        NOT NULL,
        previous_content TEXT,
        edited_at        TIMESTAMPTZ NOT NULL,
        edited_by        UUID        NOT NULL
    );
    CREATE INDEX IF NOT EXISTS idx_post_edits_post_id ON post_edits(post_id);

    CREATE TABLE IF NOT EXISTS post_reports (
        id          UUID        PRIMARY KEY DEFAULT gen_random_uuid(),
        post_id     UUID        NOT NULL,
        reporter_id UUID        NOT NULL,
        reason      VARCHAR(50),
        status      VARCHAR(20) NOT NULL DEFAULT 'PENDING',
        created_at  TIMESTAMPTZ NOT NULL DEFAULT NOW()
    );
    CREATE INDEX IF NOT EXISTS idx_post_reports_post_id ON post_reports(post_id);
---
apiVersion: batch/v1
kind: Job
metadata:
  name: post-service-db-init
  namespace: sssm
  annotations:
    "helm.sh/hook": pre-upgrade,pre-install
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: Never
      serviceAccountName: post-service
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z $(DB_HOST) $(DB_PORT); do echo waiting for postgres; sleep 3; done']
          envFrom:
            - secretRef:
                name: post-service-secrets
      containers:
        - name: flyway
          image: flyway/flyway:10-alpine
          args: [migrate, -outOfOrder=false, -validateOnMigrate=true]
          env:
            - name: FLYWAY_URL
              value: "jdbc:postgresql:$(DB_HOST):$(DB_PORT)/sssm_posts"
            - name: FLYWAY_USER
              valueFrom:
                secretKeyRef:
                  name: post-service-secrets
                  key: DB_USER
            - name: FLYWAY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: post-service-secrets
                  key: DB_PASSWORD
            - name: FLYWAY_LOCATIONS
              value: "filesystem:/flyway/sql"
            - name: FLYWAY_BASELINE_ON_MIGRATE
              value: "true"
          envFrom:
            - secretRef:
                name: post-service-secrets
          volumeMounts:
            - name: migrations
              mountPath: /flyway/sql
      volumes:
        - name: migrations
          configMap:
            name: post-service-migrations

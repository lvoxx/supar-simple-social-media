apiVersion: v1
kind: ConfigMap
metadata:
  name: message-notification-service-cql-migrations
  namespace: sssm
data:
  V1__init_msg_notifications.cql: |
    CREATE KEYSPACE IF NOT EXISTS sssm_msg_notifications
        WITH replication = {'class': 'NetworkTopologyStrategy', 'datacenter1': 3}
        AND durable_writes = true;
    
    USE sssm_msg_notifications;
    
    CREATE TABLE IF NOT EXISTS device_push_tokens (
        user_id       UUID,
        device_id     UUID,
        platform      TEXT,
        token         TEXT,
        app_version   TEXT,
        registered_at TIMESTAMP,
        last_active   TIMESTAMP,
        is_active     BOOLEAN DEFAULT TRUE,
        PRIMARY KEY (user_id, device_id)
    );
    
    CREATE TABLE IF NOT EXISTS message_notification_log (
        user_id          UUID,
        notification_id  TIMEUUID,
        conversation_id  UUID,
        message_id       UUID,
        channel          TEXT,
        status           TEXT,
        sent_at          TIMESTAMP,
        failure_reason   TEXT,
        retry_count      INT DEFAULT 0,
        PRIMARY KEY (user_id, notification_id)
    ) WITH CLUSTERING ORDER BY (notification_id DESC)
      AND default_time_to_live = 2592000;
---
apiVersion: batch/v1
kind: Job
metadata:
  name: message-notification-service-db-init
  namespace: sssm
  annotations:
    "helm.sh/hook": pre-upgrade,pre-install
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 5
  template:
    spec:
      restartPolicy: Never
      serviceAccountName: message-notification-service
      initContainers:
        - name: wait-for-cassandra
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z $(CASSANDRA_HOST) $(CASSANDRA_PORT); do echo waiting for cassandra; sleep 5; done']
          env:
            - name: CASSANDRA_HOST
              valueFrom:
                secretKeyRef: { name: message-notification-service-secrets, key: CASSANDRA_HOST }
            - name: CASSANDRA_PORT
              valueFrom:
                secretKeyRef: { name: message-notification-service-secrets, key: CASSANDRA_PORT }
      containers:
        - name: cqlsh-init
          image: cassandra:4.1-slim
          command: ["/bin/bash", "-c"]
          args:
            - |
              echo "Running CQL migration — keyspace: sssm_msg_notifications"
              cqlsh $(CASSANDRA_HOST) $(CASSANDRA_PORT) \
                -u $(CASSANDRA_USERNAME) \
                -p $(CASSANDRA_PASSWORD) \
                --ssl \
                -f /cql/V1__init_msg_notifications.cql
              echo "Migration complete for keyspace: sssm_msg_notifications"
          env:
            - name: CASSANDRA_HOST
              valueFrom:
                secretKeyRef: { name: message-notification-service-secrets, key: CASSANDRA_HOST }
            - name: CASSANDRA_PORT
              valueFrom:
                secretKeyRef: { name: message-notification-service-secrets, key: CASSANDRA_PORT }
            - name: CASSANDRA_USERNAME
              valueFrom:
                secretKeyRef: { name: message-notification-service-secrets, key: CASSANDRA_USERNAME }
            - name: CASSANDRA_PASSWORD
              valueFrom:
                secretKeyRef: { name: message-notification-service-secrets, key: CASSANDRA_PASSWORD }
          volumeMounts:
            - name: cql-scripts
              mountPath: /cql
      volumes:
        - name: cql-scripts
          configMap:
            name: message-notification-service-cql-migrations

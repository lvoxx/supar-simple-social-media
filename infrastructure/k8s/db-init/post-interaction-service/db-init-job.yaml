apiVersion: v1
kind: ConfigMap
metadata:
  name: post-interaction-service-cql-migrations
  namespace: sssm
data:
  V1__init_post_interactions.cql: |
    CREATE KEYSPACE IF NOT EXISTS sssm_post_interactions
        WITH replication = {'class': 'NetworkTopologyStrategy', 'datacenter1': 3}
        AND durable_writes = true;

    USE sssm_post_interactions;

    CREATE TABLE IF NOT EXISTS post_interaction_actors (
        post_id          UUID,
        interaction_type TEXT,
        user_id          TIMEUUID,
        created_at       TIMESTAMP,
        PRIMARY KEY ((post_id, interaction_type), user_id)
    ) WITH CLUSTERING ORDER BY (user_id DESC)
      AND default_time_to_live = 15552000;

    CREATE TABLE IF NOT EXISTS post_interaction_by_user (
        user_id          UUID,
        interaction_type TEXT,
        post_id          TIMEUUID,
        created_at       TIMESTAMP,
        PRIMARY KEY ((user_id, interaction_type), post_id)
    ) WITH CLUSTERING ORDER BY (post_id DESC)
      AND default_time_to_live = 15552000;

    CREATE TABLE IF NOT EXISTS post_interaction_counters (
        post_id        UUID PRIMARY KEY,
        like_count     COUNTER,
        share_count    COUNTER,
        bookmark_count COUNTER
    );

    CREATE TABLE IF NOT EXISTS post_view_counters (
        post_id    UUID PRIMARY KEY,
        view_count COUNTER
    );
---
apiVersion: batch/v1
kind: Job
metadata:
  name: post-interaction-service-db-init
  namespace: sssm
  annotations:
    "helm.sh/hook": pre-upgrade,pre-install
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 5
  template:
    spec:
      restartPolicy: Never
      serviceAccountName: post-interaction-service
      initContainers:
        - name: wait-for-cassandra
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z $(CASSANDRA_HOST) $(CASSANDRA_PORT); do echo waiting for cassandra; sleep 5; done']
          env:
            - name: CASSANDRA_HOST
              valueFrom:
                secretKeyRef: { name: post-interaction-service-secrets, key: CASSANDRA_HOST }
            - name: CASSANDRA_PORT
              valueFrom:
                secretKeyRef: { name: post-interaction-service-secrets, key: CASSANDRA_PORT }
      containers:
        - name: cqlsh-init
          image: cassandra:4.1-slim
          command: ["/bin/bash", "-c"]
          args:
            - |
              echo "Running CQL migration — keyspace: sssm_post_interactions"
              cqlsh $(CASSANDRA_HOST) $(CASSANDRA_PORT) \
                -u $(CASSANDRA_USERNAME) \
                -p $(CASSANDRA_PASSWORD) \
                --ssl \
                -f /cql/V1__init_post_interactions.cql
              echo "Migration complete for keyspace: sssm_post_interactions"
          env:
            - name: CASSANDRA_HOST
              valueFrom:
                secretKeyRef: { name: post-interaction-service-secrets, key: CASSANDRA_HOST }
            - name: CASSANDRA_PORT
              valueFrom:
                secretKeyRef: { name: post-interaction-service-secrets, key: CASSANDRA_PORT }
            - name: CASSANDRA_USERNAME
              valueFrom:
                secretKeyRef: { name: post-interaction-service-secrets, key: CASSANDRA_USERNAME }
            - name: CASSANDRA_PASSWORD
              valueFrom:
                secretKeyRef: { name: post-interaction-service-secrets, key: CASSANDRA_PASSWORD }
          volumeMounts:
            - name: cql-scripts
              mountPath: /cql
      volumes:
        - name: cql-scripts
          configMap:
            name: post-interaction-service-cql-migrations

apiVersion: v1
kind: ConfigMap
metadata:
  name: notification-service-cql-migrations
  namespace: sssm
data:
  V1__init_notifications.cql: |
    CREATE KEYSPACE IF NOT EXISTS sssm_notifications
        WITH replication = {'class': 'NetworkTopologyStrategy', 'datacenter1': 3}
        AND durable_writes = true;
    
    USE sssm_notifications;
    
    CREATE TABLE IF NOT EXISTS notifications_by_user (
        user_id          UUID,
        notification_id  TIMEUUID,
        type             TEXT,
        actor_id         UUID,
        actor_username   TEXT,
        actor_avatar_url TEXT,
        entity_type      TEXT,
        entity_id        UUID,
        message          TEXT,
        deep_link        TEXT,
        is_read          BOOLEAN   DEFAULT FALSE,
        is_deleted       BOOLEAN   DEFAULT FALSE,
        delivered_at     TIMESTAMP,
        created_at       TIMESTAMP,
        PRIMARY KEY (user_id, notification_id)
    ) WITH CLUSTERING ORDER BY (notification_id DESC)
      AND default_time_to_live = 7776000;
    
    CREATE TABLE IF NOT EXISTS device_sessions (
        user_id     UUID,
        device_id   UUID,
        pod_id      TEXT,
        platform    TEXT,
        last_active TIMESTAMP,
        PRIMARY KEY (user_id, device_id)
    );
---
apiVersion: batch/v1
kind: Job
metadata:
  name: notification-service-db-init
  namespace: sssm
  annotations:
    "helm.sh/hook": pre-upgrade,pre-install
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 5
  template:
    spec:
      restartPolicy: Never
      serviceAccountName: notification-service
      initContainers:
        - name: wait-for-cassandra
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z $(CASSANDRA_HOST) $(CASSANDRA_PORT); do echo waiting for cassandra; sleep 5; done']
          env:
            - name: CASSANDRA_HOST
              valueFrom:
                secretKeyRef: { name: notification-service-secrets, key: CASSANDRA_HOST }
            - name: CASSANDRA_PORT
              valueFrom:
                secretKeyRef: { name: notification-service-secrets, key: CASSANDRA_PORT }
      containers:
        - name: cqlsh-init
          image: cassandra:4.1-slim
          command: ["/bin/bash", "-c"]
          args:
            - |
              echo "Running CQL migration — keyspace: sssm_notifications"
              cqlsh $(CASSANDRA_HOST) $(CASSANDRA_PORT) \
                -u $(CASSANDRA_USERNAME) \
                -p $(CASSANDRA_PASSWORD) \
                --ssl \
                -f /cql/V1__init_notifications.cql
              echo "Migration complete for keyspace: sssm_notifications"
          env:
            - name: CASSANDRA_HOST
              valueFrom:
                secretKeyRef: { name: notification-service-secrets, key: CASSANDRA_HOST }
            - name: CASSANDRA_PORT
              valueFrom:
                secretKeyRef: { name: notification-service-secrets, key: CASSANDRA_PORT }
            - name: CASSANDRA_USERNAME
              valueFrom:
                secretKeyRef: { name: notification-service-secrets, key: CASSANDRA_USERNAME }
            - name: CASSANDRA_PASSWORD
              valueFrom:
                secretKeyRef: { name: notification-service-secrets, key: CASSANDRA_PASSWORD }
          volumeMounts:
            - name: cql-scripts
              mountPath: /cql
      volumes:
        - name: cql-scripts
          configMap:
            name: notification-service-cql-migrations

apiVersion: v1
kind: ConfigMap
metadata:
  name: media-service-migrations
  namespace: sssm
data:
  V1__init_media_assets.sql: |
    CREATE TABLE IF NOT EXISTS media_assets (
        id                   UUID        PRIMARY KEY DEFAULT gen_random_uuid(),
        owner_id             UUID        NOT NULL,
        owner_type           VARCHAR(20) NOT NULL,
        -- USER | POST | COMMENT | MESSAGE | GROUP
        original_filename    TEXT,
        content_type         VARCHAR(100),
        file_size_bytes      BIGINT,
        processed_size_bytes BIGINT,
        s3_key               TEXT        NOT NULL,
        s3_bucket            TEXT        NOT NULL,
        cdn_url              TEXT        NOT NULL,
        thumbnail_s3_key     TEXT,
        thumbnail_url        TEXT,
        width                INT,
        height               INT,
        duration_seconds     INT,
        status               VARCHAR(20) NOT NULL DEFAULT 'PROCESSING',
        -- PROCESSING | READY | REJECTED | DELETED
        rejection_reason     TEXT,
        created_at           TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        updated_at           TIMESTAMPTZ,
        created_by           UUID,
        updated_by           UUID,
        is_deleted           BOOLEAN     NOT NULL DEFAULT FALSE,
        deleted_at           TIMESTAMPTZ,
        deleted_by           UUID
    );
    CREATE INDEX IF NOT EXISTS idx_media_assets_owner  ON media_assets(owner_id, owner_type) WHERE is_deleted = false;
    CREATE INDEX IF NOT EXISTS idx_media_assets_status ON media_assets(status)               WHERE is_deleted = false;
---
apiVersion: batch/v1
kind: Job
metadata:
  name: media-service-db-init
  namespace: sssm
  annotations:
    "helm.sh/hook": pre-upgrade,pre-install
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: Never
      serviceAccountName: media-service
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z $(DB_HOST) $(DB_PORT); do echo waiting for postgres; sleep 3; done']
          envFrom:
            - secretRef:
                name: media-service-secrets
      containers:
        - name: flyway
          image: flyway/flyway:10-alpine
          args: [migrate, -outOfOrder=false, -validateOnMigrate=true]
          env:
            - name: FLYWAY_URL
              value: "jdbc:postgresql:$(DB_HOST):$(DB_PORT)/sssm_media"
            - name: FLYWAY_USER
              valueFrom:
                secretKeyRef:
                  name: media-service-secrets
                  key: DB_USER
            - name: FLYWAY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: media-service-secrets
                  key: DB_PASSWORD
            - name: FLYWAY_LOCATIONS
              value: "filesystem:/flyway/sql"
            - name: FLYWAY_BASELINE_ON_MIGRATE
              value: "true"
          envFrom:
            - secretRef:
                name: media-service-secrets
          volumeMounts:
            - name: migrations
              mountPath: /flyway/sql
      volumes:
        - name: migrations
          configMap:
            name: media-service-migrations

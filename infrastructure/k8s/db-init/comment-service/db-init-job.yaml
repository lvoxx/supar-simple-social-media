apiVersion: v1
kind: ConfigMap
metadata:
  name: comment-service-cql-migrations
  namespace: sssm
data:
  V1__init_comments.cql: |
    CREATE KEYSPACE IF NOT EXISTS sssm_comments
        WITH replication = {'class': 'NetworkTopologyStrategy', 'datacenter1': 3}
        AND durable_writes = true;

    USE sssm_comments;

    CREATE TABLE IF NOT EXISTS comments_by_post (
        post_id           UUID,
        comment_id        TIMEUUID,
        parent_comment_id UUID,
        root_comment_id   UUID,
        author_id         UUID,
        author_username   TEXT,
        author_avatar_url TEXT,
        content           TEXT,
        depth             INT,
        status            TEXT,
        is_deleted        BOOLEAN,
        deleted_at        TIMESTAMP,
        deleted_by        UUID,
        media_ids         LIST<UUID>,
        created_at        TIMESTAMP,
        updated_at        TIMESTAMP,
        PRIMARY KEY (post_id, comment_id)
    ) WITH CLUSTERING ORDER BY (comment_id DESC);

    CREATE TABLE IF NOT EXISTS comments_by_parent (
        parent_comment_id UUID,
        comment_id        TIMEUUID,
        post_id           UUID,
        author_id         UUID,
        author_username   TEXT,
        content           TEXT,
        depth             INT,
        is_deleted        BOOLEAN,
        created_at        TIMESTAMP,
        PRIMARY KEY (parent_comment_id, comment_id)
    ) WITH CLUSTERING ORDER BY (comment_id DESC);

    CREATE TABLE IF NOT EXISTS top_comments_by_post (
        post_id    UUID,
        comment_id TIMEUUID,
        author_id  UUID,
        content    TEXT,
        is_deleted BOOLEAN,
        created_at TIMESTAMP,
        PRIMARY KEY (post_id, comment_id)
    ) WITH CLUSTERING ORDER BY (comment_id DESC);

    CREATE TABLE IF NOT EXISTS comment_reactions (
        comment_id    UUID,
        user_id       UUID,
        post_id       UUID,
        reaction_type TEXT,
        reacted_at    TIMESTAMP,
        PRIMARY KEY (comment_id, user_id)
    );

    CREATE TABLE IF NOT EXISTS comment_counters (
        comment_id  UUID PRIMARY KEY,
        reply_count COUNTER,
        like_count  COUNTER,
        love_count  COUNTER,
        haha_count  COUNTER,
        wow_count   COUNTER,
        sad_count   COUNTER,
        angry_count COUNTER
    );

    CREATE TABLE IF NOT EXISTS comment_view_counters (
        comment_id UUID PRIMARY KEY,
        view_count COUNTER
    );
---
apiVersion: batch/v1
kind: Job
metadata:
  name: comment-service-db-init
  namespace: sssm
  annotations:
    "helm.sh/hook": pre-upgrade,pre-install
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 5
  template:
    spec:
      restartPolicy: Never
      serviceAccountName: comment-service
      initContainers:
        - name: wait-for-cassandra
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z $(CASSANDRA_HOST) $(CASSANDRA_PORT); do echo waiting for cassandra; sleep 5; done']
          env:
            - name: CASSANDRA_HOST
              valueFrom:
                secretKeyRef: { name: comment-service-secrets, key: CASSANDRA_HOST }
            - name: CASSANDRA_PORT
              valueFrom:
                secretKeyRef: { name: comment-service-secrets, key: CASSANDRA_PORT }
      containers:
        - name: cqlsh-init
          image: cassandra:4.1-slim
          command: ["/bin/bash", "-c"]
          args:
            - |
              echo "Running CQL migration — keyspace: sssm_comments"
              cqlsh $(CASSANDRA_HOST) $(CASSANDRA_PORT) \
                -u $(CASSANDRA_USERNAME) \
                -p $(CASSANDRA_PASSWORD) \
                --ssl \
                -f /cql/V1__init_comments.cql
              echo "Migration complete for keyspace: sssm_comments"
          env:
            - name: CASSANDRA_HOST
              valueFrom:
                secretKeyRef: { name: comment-service-secrets, key: CASSANDRA_HOST }
            - name: CASSANDRA_PORT
              valueFrom:
                secretKeyRef: { name: comment-service-secrets, key: CASSANDRA_PORT }
            - name: CASSANDRA_USERNAME
              valueFrom:
                secretKeyRef: { name: comment-service-secrets, key: CASSANDRA_USERNAME }
            - name: CASSANDRA_PASSWORD
              valueFrom:
                secretKeyRef: { name: comment-service-secrets, key: CASSANDRA_PASSWORD }
          volumeMounts:
            - name: cql-scripts
              mountPath: /cql
      volumes:
        - name: cql-scripts
          configMap:
            name: comment-service-cql-migrations

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  java:
    name: Java (build + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven
      - name: Build and test
        run: mvn -B -f pom.xml verify

  go:
    name: Go (build + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.3'
      - name: Build
        working-directory: libs/gokit
        run: go build ./...
      - name: Test
        working-directory: libs/gokit
        run: go test ./...

  proto:
    name: Protobuf (lint + breaking)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: bufbuild/buf-action@v1
        with:
          input: schemas
          breaking_against: 'https://github.com/${{ github.repository }}.git#branch=main,subdir=schemas'

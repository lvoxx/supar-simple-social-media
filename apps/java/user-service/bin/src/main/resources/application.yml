spring:
  application:
    name: user-service
  datasource:
    # Schema `sssm` is created and migrated by INFRASTRUCTURE (Flyway runner), never by
    # this app. See deploy/migrations/user-service + docker/docker-compose.flyway.yml.
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/postgres?currentSchema=sssm}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
  jpa:
    open-in-view: false
    hibernate:
      # The app only validates against the infra-managed schema; it never creates it.
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
# Authentication is performed by the gateway sidecar, which validates the Keycloak token and
# forwards identity via X-Auth-* headers. This service is NOT an OAuth2 resource server and has no
# issuer-uri / JWT decoding (see docs/adr/0003-gateway-sidecar-authn.md).

server:
  # 8080 is taken by Keycloak in local dev.
  port: ${SERVER_PORT:8081}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    root: INFO
